name: Release Windows Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install xlrd xlwt openpyxl PyQt6 pyinstaller

      - name: Run tests
        run: python -m unittest tests/test_refactor.py

      - name: Build Windows app
        run: >
          pyinstaller --noconfirm --clean --windowed --onedir
          --add-data "templates;templates"
          --name "toMTP"
          kiotviet_to_mtp.py

      - name: Package release asset
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "toMTP-windows-$tag.zip"

          Compress-Archive -Path "dist\toMTP" -DestinationPath $zip -Force
          Get-FileHash $zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $zip" } |
            Out-File -Encoding ascii "$zip.sha256"

          New-Item -ItemType Directory -Path release -Force | Out-Null
          Move-Item $zip release\
          Move-Item "$zip.sha256" release\

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "release\toMTP-windows-${{ github.ref_name }}.zip#toMTP Windows" `
            "release\toMTP-windows-${{ github.ref_name }}.zip.sha256#SHA256 checksum" `
            --title "toMTP ${{ github.ref_name }}" `
            --generate-notes `
            --verify-tag
